<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baristex</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 400px; margin: 4rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 2rem; }
        #auth { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; }
        #auth h2 { margin-top: 0; }
        #auth input {
            display: block; width: 100%; padding: 0.5rem 0.6rem;
            margin-bottom: 0.75rem; font-size: 1rem;
            border: 1px solid #ccc; border-radius: 4px;
        }
        #auth button { padding: 0.5rem 1.2rem; font-size: 1rem; cursor: pointer; }
        #auth p { margin: 0.75rem 0 0; font-size: 0.9rem; }
        .error   { color: #c00; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .success { color: #080; margin-bottom: 0.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Baristex</h1>

    <div id="auth" hx-get="/auth/status" hx-trigger="load" hx-swap="outerHTML">
        <p>Loading&hellip;</p>
    </div>
</body>
</html>
